input:
  preview_dir: "runs/segformer_b0/previews/epoch_030"
  filename_contains: "prediction"

output:
  output_dir: "outputs/vectorization/v008"
  export_svg: true
  export_json: false

classes:
  background: 0
  wall: 1
  opening: 2
  room: 3
  icon: 4

scale:
  mode: "auto"
  fallback_unit: "px"
  fallback_scale: 1.0

cleanup:
  min_wall_component_area: 20
  min_opening_component_area: 8
  min_room_component_area: 100
  close_wall_gap_px: 3

wall_extraction:
  snap_angle_degrees: 8
  merge_distance_px: 6
  min_wall_length_px: 10

opening_classification:
  enabled: true
  window_min_aspect_ratio: 2.5
  door_max_aspect_ratio: 2.0
  min_confidence_for_type: 0.65

svg:
  include_debug_layer: true
  draw_rooms: true
  draw_walls: true
  draw_openings: true
  draw_doors: true
  draw_windows: true
