input:
  preview_dir: "runs/segformer_b0_run3/previews/epoch_030"
  filename_contains: "prediction"

output:
  output_dir: "outputs/vectorization/v008"
  export_svg: true
  export_json: false

classes:
  background: 0
  floor: 1
  wall: 2
  window: 3
  door_arc: 4
  door_leaf: 5
  door_origin: 6

scale:
  allow_estimated_scale: true
  explicit_px_to_mm: null
  door_width_modules_mm: [700, 900]
  wall_thickness_modules_mm: [100, 200]
  min_scale_confidence_for_metric: 0.70

snapping:
  allowed_angles_deg: [0, 45, 90, 135, 180, 225, 270, 315]
  max_angle_snap_error_deg: 12
  min_segment_length_mm: 100

walls:
  build_order: ["outer", "inner"]
  bridge_opening_gaps: true
  ortho_snap_degrees: 20
  diagonal_snap_degrees: 10
  merge_distance_px: 6
  min_wall_length_px: 10
  connect_gap_px: 20
  inner_attach_outer_threshold_mm: 500

openings:
  require_host_wall: true
  replace_wall_segment: true
  max_host_wall_dist_px: 40
  min_hosted_width_px: 10
  corner_ambiguity_px: 25
  min_remainder_px: 3

windows:
  min_width_mm: 300

doors:
  require_arc_group: true
  min_door_arc_component_area: 4
  hinge_intersection_tolerance_px: 6
  hinge_snap_to_wall_max_dist_px: 40
  hinge_arc_inference_enabled: true
  door_width_modules_mm: [700, 900]

floor:
  prefer_outer_wall_when_ambiguous: true

cleanup:
  min_wall_component_area: 20
  min_floor_component_area: 100
  min_window_component_area: 8
  min_door_arc_component_area: 4
  min_door_leaf_component_area: 4
  min_door_origin_component_area: 4
  close_wall_gap_px: 3

svg:
  draw_floor: true
  draw_wall: true
  draw_window: true
  draw_door: true
