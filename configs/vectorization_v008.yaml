# Config for the v008 orthogonal point-graph mask-to-vector pipeline.
# Shape follows spec_v008_mask_to_vector.md SS16; batch-mode fields
# (preview_dir/filename_contains/output_dir) are additive, needed because
# run_mask_to_vector.py processes a directory of prediction images, not one.

input:
  preview_dir: "runs/segformer_b0_run3/previews/epoch_030"
  filename_contains: "prediction"
  prediction_path: null
  palette: run3
  rgb_tolerance: 20

scale:
  allow_estimated_scale: true
  explicit_px_to_mm: null
  door_width_modules_mm: [700, 900]
  wall_thickness_modules_mm: [100, 200]
  min_scale_confidence_for_metric: 0.70

geometry:
  allowed_angles_deg: [0, 90, 180, 270]
  allow_diagonal_walls: false
  cardinal_tolerance_deg: 25.0
  point_merge_tolerance_mm: 500
  axis_alignment_tolerance_mm: 500
  px_fallback_tolerance_px: 6.0
  corridor_slack_px: 20.0
  free_end_merge_tolerance_px: 8.0
  free_end_opening_proximity_px: 20.0
  node_match_tolerance_px: 12.0
  min_segment_length_mm: 100
  min_hosted_width_px: 10.0
  corner_ambiguity_px: 25.0
  min_remainder_px: 3.0

components:
  min_wall_area_px: 4
  min_window_area_px: 4
  min_door_arc_area_px: 4
  min_door_leaf_area_px: 2
  min_door_origin_area_px: 2

windows:
  min_width_mm: 300
  require_two_wall_window_points: true
  replace_wall_segment: true

doors:
  require_arc_group: true
  infer_origin_when_purple_missing: true
  reject_without_red_arc: true
  hinge_probe_radius_px: 14.0
  hinge_intersection_tolerance_px: 6.0
  hinge_snap_to_wall_max_dist_px: 40.0
  door_width_modules_mm: [700, 900]
  max_hinge_end_distance_from_arc_mm: 200.0
  replace_wall_segment: true

output:
  output_dir: "outputs/vectorization/v008"
  include_floor: false
  write_debug_overlay: true
  write_metrics: true
